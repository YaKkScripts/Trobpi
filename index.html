<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glop</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --green: #22c55e;
  --green-dark: #16a34a;
  --green-hover: #15803d;
  --green-light: #bbf7d0;
  --green-xlight: #f0fdf4;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --red: #ef4444;
  --red-light: #fef2f2;
  --red-border: #fecaca;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.09);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.13);
  --shadow-xl: 0 20px 64px rgba(0,0,0,0.16);
  --r-xs: 6px; --r-sm: 10px; --r: 16px; --r-lg: 22px;
  --nav-h: 66px;
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:#f4f6f3;color:var(--gray-900);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(255,255,255,0.9);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(0,0,0,0.07);display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:500;}
.nav-left{display:flex;align-items:center;gap:16px;}
.nav-right{display:flex;align-items:center;gap:12px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.75rem;letter-spacing:-1.5px;color:var(--gray-900);cursor:pointer;user-select:none;transition:opacity .15s;}
.logo:hover{opacity:.75;}
.logo em{font-style:normal;color:var(--green);}
.btn-upload{display:flex;align-items:center;gap:7px;background:var(--green);color:white;border:none;padding:9px 22px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .18s var(--ease),transform .15s var(--ease),box-shadow .18s;letter-spacing:.01em;}
.btn-upload:hover{background:var(--green-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(34,197,94,.35);}
.btn-upload:active{transform:translateY(0);}
.pill-badge{background:var(--green-xlight);color:var(--green-dark);border:1px solid var(--green-light);padding:6px 14px;border-radius:50px;font-size:.79rem;font-weight:600;display:flex;align-items:center;gap:6px;}
.pill-badge::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(.8)}}

/* AVATAR */
.avatar-wrap{position:relative;}
.avatar-btn{width:40px;height:40px;border-radius:50%;background:var(--green);color:white;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:transform .15s var(--ease),box-shadow .15s,background .15s;display:flex;align-items:center;justify-content:center;}
.avatar-btn:hover{background:var(--green-dark);transform:scale(1.08);box-shadow:0 0 0 4px var(--green-light);}

/* DROPDOWN */
.dropdown{position:absolute;top:50px;right:0;background:white;border:1px solid var(--gray-200);border-radius:var(--r);box-shadow:var(--shadow-xl);min-width:210px;overflow:hidden;z-index:600;transform-origin:top right;animation:dropIn .17s var(--ease) both;}
@keyframes dropIn{from{opacity:0;transform:scale(.9) translateY(-8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.dd-header{padding:13px 18px 9px;font-size:.74rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--gray-100);}
.dd-item{padding:12px 18px;display:flex;align-items:center;gap:10px;font-size:.9rem;color:var(--gray-700);cursor:pointer;transition:background .1s;}
.dd-item:hover{background:var(--gray-50);}
.dd-item.red{color:var(--red);}
.dd-item.red:hover{background:var(--red-light);}
.dd-icon{width:18px;height:18px;opacity:.65;flex-shrink:0;}

/* MAIN */
main{max-width:1320px;margin:0 auto;padding:calc(var(--nav-h) + 44px) 32px 64px;}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.3rem;color:var(--gray-800);margin-bottom:28px;}

/* GAME GRID */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:22px;}
.empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:90px 20px;gap:12px;}
.empty-icon{font-size:4rem;line-height:1;}
.empty-state h3{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;color:var(--gray-700);}
.empty-state p{font-size:.87rem;color:var(--gray-400);}

/* GAME CARD */
.game-card{background:white;border-radius:var(--r);border:1px solid var(--gray-200);overflow:hidden;cursor:pointer;transition:transform .22s var(--ease),box-shadow .22s var(--ease),border-color .2s;position:relative;display:flex;flex-direction:column;user-select:none;}
.game-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);border-color:var(--gray-300);}
.game-card:active{transform:translateY(-2px);}

/* Thumb — pointer-events: none so the card click always fires */
.card-thumb{position:relative;width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--green-xlight),var(--green-light));overflow:hidden;pointer-events:none;}
.card-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;transition:transform .4s var(--ease);}
.game-card:hover .card-thumb img{transform:scale(1.05);}
.card-thumb-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.8rem;z-index:0;}

/* Preview iframe — always pointer-events:none so it never blocks click */
.card-prev-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;z-index:2;pointer-events:none;opacity:0;transition:opacity .4s;}
.card-prev-iframe.show{opacity:1;}

/* Play overlay */
.card-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);z-index:3;display:flex;align-items:center;justify-content:center;transition:background .22s;pointer-events:none;}
.game-card:hover .card-play-overlay{background:rgba(0,0,0,.2);}
.play-circle{width:48px;height:48px;background:rgba(255,255,255,.92);border-radius:50%;display:flex;align-items:center;justify-content:center;transform:scale(0);transition:transform .22s var(--ease);box-shadow:0 4px 18px rgba(0,0,0,.2);}
.game-card:hover .play-circle{transform:scale(1);}
.play-circle svg{width:18px;height:18px;margin-left:2px;color:var(--green-dark);}

.card-info{padding:14px 16px 16px;}
.card-name{font-family:'Syne',sans-serif;font-weight:600;font-size:.97rem;color:var(--gray-900);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-author{font-size:.78rem;color:var(--gray-400);}

/* GAME PLAYER */
.player-overlay{position:fixed;inset:0;background:#0c0c0c;z-index:900;display:flex;flex-direction:column;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.player-bar{height:54px;background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0;}
.player-title{font-family:'Syne',sans-serif;font-weight:600;font-size:1rem;color:white;display:flex;align-items:center;gap:10px;}
.player-title span{color:rgba(255,255,255,.4);font-family:'DM Sans',sans-serif;font-weight:400;font-size:.84rem;}
.btn-close-player{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);color:white;padding:8px 18px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:500;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:6px;}
.btn-close-player:hover{background:rgba(255,255,255,.2);}
.player-frame{flex:1;border:none;width:100%;display:block;}
.player-nourl{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:rgba(255,255,255,.3);font-size:.9rem;}
.player-nourl .icon{font-size:3rem;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:700;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .18s ease;}
.modal{background:white;border-radius:var(--r-lg);padding:38px;width:min(480px,100%);box-shadow:var(--shadow-xl);animation:slideUp .22s var(--ease);position:relative;max-height:92vh;overflow-y:auto;}
.modal-wide{width:min(560px,100%);}
@keyframes slideUp{from{opacity:0;transform:translateY(28px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1.45rem;color:var(--gray-900);margin-bottom:26px;letter-spacing:-.3px;}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--gray-100);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray-500);font-size:1rem;transition:background .13s,transform .13s;}
.modal-close:hover{background:var(--gray-200);transform:scale(1.08);}

/* FORMS */
.form-group{margin-bottom:20px;}
.form-group label{display:block;font-size:.81rem;font-weight:600;color:var(--gray-600);margin-bottom:7px;letter-spacing:.01em;}
.form-group input,.form-group textarea{width:100%;padding:12px 15px;border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:.93rem;color:var(--gray-900);background:var(--gray-50);outline:none;transition:border-color .16s,box-shadow .16s,background .16s;}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--gray-400);}
.form-group input:focus,.form-group textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.14);background:white;}
.form-group input:disabled{opacity:.6;cursor:not-allowed;}
.form-error{font-size:.79rem;color:var(--red);margin-top:6px;min-height:16px;font-weight:500;}
.btn-primary{width:100%;padding:13px;background:var(--green);color:white;border:none;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-weight:600;font-size:.94rem;cursor:pointer;transition:background .16s,transform .13s var(--ease),box-shadow .16s;margin-top:4px;}
.btn-primary:hover{background:var(--green-dark);transform:translateY(-1px);box-shadow:0 4px 14px rgba(34,197,94,.3);}
.btn-primary:active{transform:translateY(0);}
.modal-switch{text-align:center;margin-top:18px;font-size:.86rem;color:var(--gray-500);}
.modal-switch a{color:var(--green-dark);cursor:pointer;font-weight:600;}
.modal-switch a:hover{text-decoration:underline;}

/* DROPZONE */
.dropzone{border:2px dashed var(--gray-200);border-radius:var(--r-sm);padding:26px 20px;text-align:center;cursor:pointer;transition:border-color .16s,background .16s;margin-bottom:12px;background:var(--gray-50);}
.dropzone:hover,.dropzone.drag-over{border-color:var(--green);background:var(--green-xlight);}
.dropzone-emoji{font-size:2rem;margin-bottom:8px;}
.dropzone-text{font-size:.84rem;color:var(--gray-500);}
.dropzone-text strong{color:var(--green-dark);}
.img-preview-box{margin-top:10px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--gray-200);aspect-ratio:16/9;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--gray-300);}
.img-preview-box img{width:100%;height:100%;object-fit:cover;display:block;}

/* ADMIN PANEL */
.admin-panel{position:fixed;top:var(--nav-h);left:0;bottom:0;width:300px;background:white;border-right:1px solid var(--gray-200);box-shadow:var(--shadow-lg);z-index:400;display:flex;flex-direction:column;animation:slideInLeft .22s var(--ease);}
@keyframes slideInLeft{from{transform:translateX(-100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.admin-head{padding:18px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.admin-head h3{font-family:'Syne',sans-serif;font-weight:700;font-size:.98rem;color:var(--gray-900);}
.admin-head-x{background:var(--gray-100);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray-500);font-size:.9rem;transition:background .12s;}
.admin-head-x:hover{background:var(--gray-200);}
.admin-count-bar{padding:10px 20px;background:var(--green-xlight);border-bottom:1px solid var(--green-light);font-size:.81rem;color:var(--green-dark);font-weight:600;}
.admin-search-bar{padding:12px 16px;border-bottom:1px solid var(--gray-100);}
.admin-search-bar input{width:100%;padding:9px 13px;border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;transition:border-color .15s;}
.admin-search-bar input:focus{border-color:var(--green);}
.admin-list{flex:1;overflow-y:auto;}
.admin-item{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-50);transition:background .1s;}
.admin-item:hover{background:var(--gray-50);}
.admin-item-left{display:flex;align-items:center;gap:10px;}
.admin-av{width:34px;height:34px;border-radius:50%;background:var(--green-light);color:var(--green-dark);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;flex-shrink:0;}
.admin-av.banned{background:#fee2e2;color:var(--red);}
.admin-uname{font-size:.88rem;font-weight:500;color:var(--gray-800);}
.admin-status{font-size:.72rem;color:var(--green);font-weight:500;}
.admin-status.off{color:var(--gray-400);}
.admin-btns{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.btn-xs{padding:4px 11px;border-radius:var(--r-xs);font-size:.73rem;font-weight:600;cursor:pointer;border:1px solid;transition:background .1s;white-space:nowrap;}
.btn-xs.danger{background:var(--red-light);color:var(--red);border-color:var(--red-border);}
.btn-xs.danger:hover{background:#fee2e2;}
.btn-xs.safe{background:var(--green-xlight);color:var(--green-dark);border-color:var(--green-light);}
.btn-xs.safe:hover{background:var(--green-light);}
.btn-xs.neutral{background:var(--gray-100);color:var(--gray-600);border-color:var(--gray-200);}
.btn-xs.neutral:hover{background:var(--gray-200);}
.badge-banned{font-size:.67rem;font-weight:600;background:var(--red-light);color:var(--red);border:1px solid var(--red-border);padding:1px 6px;border-radius:50px;margin-left:4px;}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none;}
.toast{background:var(--gray-900);color:white;padding:13px 20px;border-radius:10px;font-size:.87rem;font-weight:500;box-shadow:var(--shadow-lg);animation:toastSlide .22s var(--ease);max-width:300px;border-left:3px solid rgba(255,255,255,.15);}
.toast.success{background:var(--green-dark);border-left-color:var(--green-light);}
.toast.error{background:var(--red);border-left-color:#fca5a5;}
@keyframes toastSlide{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);}}

/* BANNED SCREEN */
.banned-screen{position:fixed;inset:0;background:white;z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.banned-screen h1{font-family:'Syne',sans-serif;font-size:2rem;color:var(--red);}
.banned-screen p{color:var(--gray-500);font-size:.9rem;}

@media(max-width:640px){nav{padding:0 18px;}main{padding-left:18px;padding-right:18px;}.modal{padding:28px 22px;}}
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <div class="logo" onclick="G.goHome()">Gl<em>o</em>p</div>
    <button class="btn-upload" id="btnUpload" style="display:none" onclick="G.openUpload()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M8 11V3M5 6l3-3 3 3"/><path d="M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg>
      Upload
    </button>
  </div>
  <div class="nav-right">
    <div class="pill-badge" id="onlinePill">0 online</div>
    <div class="avatar-wrap">
      <button class="avatar-btn" id="avatarBtn" onclick="G.toggleDropdown()">P</button>
      <div class="dropdown" id="dropdown" style="display:none"></div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main>
  <div class="section-title">🎮 Games</div>
  <div class="games-grid" id="gamesGrid"></div>
</main>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel" style="display:none">
  <div class="admin-head">
    <h3>🛡️ Admin Panel</h3>
    <button class="admin-head-x" onclick="G.closeAdmin()">✕</button>
  </div>
  <div class="admin-count-bar" id="adminCountBar">Loading…</div>
  <div class="admin-search-bar">
    <input id="adminSearch" type="text" placeholder="Search username…" oninput="G.filterAdmin(this.value)">
  </div>
  <div class="admin-list" id="adminList"></div>
</div>

<!-- MODAL ROOT -->
<div id="modalRoot"></div>

<script>
/* =====================================================
   DB — localStorage persistence
   ===================================================== */
const DB = {
  _g(k,d){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}},
  _s(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  users(){return this._g('glop_users',[]);},
  games(){return this._g('glop_games',[]);},
  saveUsers(u){this._s('glop_users',u);},
  saveGames(g){this._s('glop_games',g);},
  online(){return this._g('glop_online',[]);},
  setOnline(o){this._s('glop_online',o);},
  markOnline(u){const o=this.online();if(!o.includes(u)){o.push(u);this.setOnline(o);}},
  markOffline(u){this.setOnline(this.online().filter(x=>x!==u));},
  me(){try{return JSON.parse(sessionStorage.getItem('glop_me'))||null;}catch{return null;}},
  setMe(u){try{sessionStorage.setItem('glop_me',JSON.stringify(u));}catch{}},
  clearMe(){try{sessionStorage.removeItem('glop_me');}catch{}},
  getUserByName(n){return this.users().find(u=>u.username.toLowerCase()===n.toLowerCase());},
  createUser(username,password){
    const users=this.users();
    if(users.find(u=>u.username.toLowerCase()===username.toLowerCase()))return null;
    const u={username,password,banned:false,created:Date.now()};
    users.push(u);this.saveUsers(users);return u;
  },
  banUser(n,b){const u=this.users();const i=u.findIndex(x=>x.username.toLowerCase()===n.toLowerCase());if(i>=0){u[i].banned=b;this.saveUsers(u);}},
  banGame(id,b){const g=this.games();const i=g.findIndex(x=>x.id===id);if(i>=0){g[i].banned=b;this.saveGames(g);}},
  addGame(game){const g=this.games();g.push(game);this.saveGames(g);}
};

const ADMIN={username:'YaKkScripts',password:'Hww12345.'};

/* ensure admin account */
(()=>{if(!DB.getUserByName(ADMIN.username)){const u=DB.users();u.push({username:ADMIN.username,password:ADMIN.password,banned:false,created:Date.now()});DB.saveUsers(u);}})();

/* =====================================================
   PREVIEW MANAGER — hover → show iframe for 5s
   ===================================================== */
const PV={
  timers:{},
  enter(id){
    this.timers[id]=setTimeout(()=>{
      const el=document.getElementById('pv_'+id);
      if(el)el.classList.add('show');
    },700);
  },
  leave(id){
    clearTimeout(this.timers[id]);
    const el=document.getElementById('pv_'+id);
    if(el){
      el.classList.remove('show');
      const s=el.getAttribute('data-src');
      el.src='about:blank';
      setTimeout(()=>{if(el)el.src=s;},80);
    }
  }
};

/* =====================================================
   APP
   ===================================================== */
const G={
  _dd:false,
  _admin:false,

  init(){
    // Ctrl+P → admin
    document.addEventListener('keydown',e=>{
      if(e.ctrlKey&&e.key.toLowerCase()==='p'){
        e.preventDefault();
        const me=DB.me();
        if(me&&me.username.toLowerCase()===ADMIN.username.toLowerCase())this.toggleAdmin();
      }
    });
    // close dropdown on outside click
    document.addEventListener('click',e=>{
      if(!e.target.closest('.avatar-wrap'))this._ddClose();
    });
    // mark offline on unload
    window.addEventListener('beforeunload',()=>{const me=DB.me();if(me)DB.markOffline(me.username);});
    // sync online count
    setInterval(()=>this._syncOnline(),4000);
    this._render();
  },

  _render(){
    this._renderNav();
    this._renderGames();
    this._syncOnline();
    this._checkBanned();
  },

  _checkBanned(){
    const me=DB.me();if(!me)return;
    const u=DB.getUserByName(me.username);
    if(u&&u.banned){
      document.getElementById('modalRoot').innerHTML=`
        <div class="banned-screen">
          <div style="font-size:4rem">🚫</div>
          <h1>Account Banned</h1>
          <p>Your account was banned by an administrator.</p>
          <button class="btn-primary" style="width:auto;padding:11px 32px;margin-top:6px" onclick="G.signOut()">Sign Out</button>
        </div>`;
    }
  },

  _renderNav(){
    const me=DB.me();
    document.getElementById('avatarBtn').textContent=me?me.username[0].toUpperCase():'P';
    document.getElementById('btnUpload').style.display=me?'flex':'none';
  },

  _syncOnline(){
    const n=DB.online().length;
    const p=document.getElementById('onlinePill');
    if(p)p.textContent=n+' online';
    const cb=document.getElementById('adminCountBar');
    if(cb)cb.textContent=n+' player'+(n!==1?'s':'')+' online';
    if(this._admin)this._renderAdminList(document.getElementById('adminSearch')?.value||'');
  },

  /* ── GAMES ── */
  _renderGames(){
    const grid=document.getElementById('gamesGrid');if(!grid)return;
    const games=DB.games().filter(g=>!g.banned);
    if(!games.length){
      grid.innerHTML=`<div class="empty-state">
        <div class="empty-icon">🕹️</div>
        <h3>We Don't Have Any Games :\\</h3>
        <p>Be the first to upload a game!</p>
      </div>`;return;
    }
    grid.innerHTML=games.map(g=>this._cardHTML(g)).join('');
  },

  _cardHTML(g){
    const imgTag=g.image?`<img src="${ea(g.image)}" alt="${ea(g.name)}" loading="lazy" onerror="this.style.display='none'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;">`:'' ;
    const pvTag=g.url?`<iframe id="pv_${g.id}" class="card-prev-iframe" src="about:blank" data-src="${ea(g.url)}" sandbox="allow-scripts allow-same-origin" loading="lazy" tabindex="-1"></iframe>`:'';
    return `<div class="game-card"
        onclick="G.playGame('${g.id}')"
        onmouseenter="PV.enter('${g.id}')"
        onmouseleave="PV.leave('${g.id}')">
      <div class="card-thumb">
        <div class="card-thumb-placeholder">🎮</div>
        ${imgTag}
        ${pvTag}
        <div class="card-play-overlay">
          <div class="play-circle">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
        </div>
      </div>
      <div class="card-info">
        <div class="card-name">${e(g.name)}</div>
        <div class="card-author">by ${e(g.author)}</div>
      </div>
    </div>`;
  },

  playGame(id){
    const game=DB.games().find(g=>g.id===id);if(!game)return;
    const inner=game.url
      ?`<iframe class="player-frame" src="${ea(game.url)}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals" allow="fullscreen;autoplay" allowfullscreen></iframe>`
      :`<div class="player-nourl"><div class="icon">🎮</div><p>No playable URL for this game.</p></div>`;
    document.getElementById('modalRoot').innerHTML=`
      <div class="player-overlay">
        <div class="player-bar">
          <div class="player-title">${e(game.name)} <span>by ${e(game.author)}</span></div>
          <button class="btn-close-player" onclick="G.closePlayer()">✕ Close</button>
        </div>
        ${inner}
      </div>`;
  },

  closePlayer(){document.getElementById('modalRoot').innerHTML='';},

  goHome(){
    document.getElementById('modalRoot').innerHTML='';
    this._render();
  },

  /* ── DROPDOWN ── */
  toggleDropdown(){this._dd=!this._dd;const dd=document.getElementById('dropdown');if(this._dd){dd.style.display='block';this._renderDropdown();}else{dd.style.display='none';}},
  _ddClose(){this._dd=false;document.getElementById('dropdown').style.display='none';},

  _renderDropdown(){
    const me=DB.me();
    document.getElementById('dropdown').innerHTML=me?`
      <div class="dd-header">Signed in as ${e(me.username)}</div>
      <div class="dd-item red" onclick="G.signOut()">
        <svg class="dd-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Sign Out
      </div>`:`
      <div class="dd-header">Account</div>
      <div class="dd-item" onclick="G.openSignIn()">
        <svg class="dd-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        Sign In
      </div>
      <div class="dd-item" onclick="G.openRegister()">
        <svg class="dd-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8zM19 8v6M22 11h-6"/></svg>
        Create Account
      </div>`;
  },

  /* ── AUTH ── */
  openSignIn(){
    this._ddClose();
    this._modal(`
      <h2>Welcome back</h2>
      <div class="form-group"><label>Username</label>
        <input id="si-u" type="text" placeholder="Your username" autocomplete="username" spellcheck="false"></div>
      <div class="form-group"><label>Password</label>
        <input id="si-p" type="password" placeholder="Your password" autocomplete="current-password">
        <div class="form-error" id="si-err"></div></div>
      <button class="btn-primary" onclick="G._doSignIn()">Sign In</button>
      <div class="modal-switch">No account? <a onclick="G.openRegister()">Create one</a></div>
    `);
    setTimeout(()=>document.getElementById('si-u')?.focus(),60);
  },

  _doSignIn(){
    const u=v('si-u'),p=v('si-p'),err=document.getElementById('si-err');
    if(!u||!p){err.textContent='Fill in both fields.';return;}
    const user=DB.getUserByName(u);
    if(!user||user.password!==p){err.textContent='Incorrect username or password.';return;}
    if(user.banned){err.textContent='This account has been banned.';return;}
    DB.setMe({username:user.username});DB.markOnline(user.username);
    this.closeModal();this._render();
    toast('👋 Welcome back, '+user.username+'!','success');
  },

  openRegister(){
    this._ddClose();
    this._modal(`
      <h2>Create Account</h2>
      <div class="form-group"><label>Username</label>
        <input id="rg-u" type="text" placeholder="Choose a username" maxlength="24" autocomplete="username" spellcheck="false"></div>
      <div class="form-group"><label>Password</label>
        <input id="rg-p" type="password" placeholder="At least 6 characters" autocomplete="new-password"></div>
      <div class="form-group"><label>Confirm Password</label>
        <input id="rg-p2" type="password" placeholder="Repeat your password" autocomplete="new-password">
        <div class="form-error" id="rg-err"></div></div>
      <button class="btn-primary" onclick="G._doRegister()">Create Account</button>
      <div class="modal-switch">Already have one? <a onclick="G.openSignIn()">Sign in</a></div>
    `);
    setTimeout(()=>document.getElementById('rg-u')?.focus(),60);
  },

  _doRegister(){
    const u=v('rg-u'),p=v('rg-p'),p2=v('rg-p2'),err=document.getElementById('rg-err');
    if(!u||!p){err.textContent='Fill in all fields.';return;}
    if(u.length<3){err.textContent='Username must be at least 3 characters.';return;}
    if(/\s/.test(u)){err.textContent='No spaces in username.';return;}
    if(p.length<6){err.textContent='Password must be at least 6 characters.';return;}
    if(p!==p2){err.textContent='Passwords do not match.';return;}
    const user=DB.createUser(u,p);
    if(!user){err.textContent='Username taken — try another.';return;}
    DB.setMe({username:user.username});DB.markOnline(user.username);
    this.closeModal();this._render();
    toast('🎉 Welcome to Glop, '+user.username+'!','success');
  },

  signOut(){
    const me=DB.me();if(me)DB.markOffline(me.username);
    DB.clearMe();this._ddClose();
    document.getElementById('modalRoot').innerHTML='';
    this._render();toast('Signed out.','');
  },

  /* ── UPLOAD ── */
  openUpload(){
    const me=DB.me();if(!me){toast('Sign in first.','error');return;}
    this._ud={name:'',url:'',image:''};
    this._modal(`
      <h2>Upload a Game</h2>
      <div class="form-group"><label>Game Name</label>
        <input id="up-name" type="text" placeholder="My Awesome Game" maxlength="60" oninput="G._ud.name=this.value"></div>
      <div class="form-group"><label>Game File or URL</label>
        <div class="dropzone" id="dz"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="G._onDrop(event)"
          onclick="document.getElementById('fi').click()">
          <div class="dropzone-emoji">📂</div>
          <div class="dropzone-text">Drop an <strong>HTML file</strong> or <strong>click to browse</strong></div>
        </div>
        <input id="fi" type="file" accept=".html,.htm" style="display:none" onchange="G._onFileChange(this)">
        <input id="up-url" type="url" placeholder="Or paste a game URL (https://…)" style="margin-top:0" oninput="G._ud.url=this.value">
        <div class="form-error" id="up-url-note" style="color:var(--green-dark);font-weight:500;"></div>
      </div>
      <div class="form-group"><label>Cover Image URL <span style="font-weight:400;color:var(--gray-400)">(optional)</span></label>
        <input id="up-img" type="url" placeholder="https://…/cover.jpg" oninput="G._previewImg(this.value)">
        <div class="img-preview-box" id="img-prev">🖼️</div>
      </div>
      <div class="form-error" id="up-err"></div>
      <button class="btn-primary" onclick="G._doUpload()">🚀 Publish Game</button>
    `,true);
    setTimeout(()=>document.getElementById('up-name')?.focus(),60);
  },

  _previewImg(url){
    this._ud.image=url;
    const w=document.getElementById('img-prev');if(!w)return;
    w.innerHTML=url?`<img src="${ea(url)}" onerror="this.parentElement.textContent='🖼️'">`: '🖼️';
  },

  _onFileChange(inp){
    const file=inp.files[0];if(!file)return;
    if(!file.name.match(/\.html?$/i)){toast('Please select an HTML file.','error');return;}
    this._readFile(file);
  },

  _onDrop(e){
    e.preventDefault();
    document.getElementById('dz')?.classList.remove('drag-over');
    const file=e.dataTransfer.files[0];if(!file)return;
    if(!file.name.match(/\.html?$/i)){toast('Drop an HTML file.','error');return;}
    this._readFile(file);
  },

  _readFile(file){
    const reader=new FileReader();
    reader.onload=ev=>{
      // Convert to base64 data URL so it persists in localStorage
      const b64=btoa(unescape(encodeURIComponent(ev.target.result)));
      this._ud.url='data:text/html;base64,'+b64;
      const note=document.getElementById('up-url-note');
      if(note)note.textContent='✓ "'+file.name+'" loaded and ready';
      const inp=document.getElementById('up-url');
      if(inp){inp.value=file.name;inp.disabled=true;}
      toast('"'+file.name+'" ready!','success');
    };
    reader.readAsText(file);
  },

  _doUpload(){
    const name=(v('up-name')||this._ud.name).trim();
    const url=(this._ud.url||v('up-url')).trim();
    const image=(this._ud.image||v('up-img')).trim();
    const err=document.getElementById('up-err');
    if(!name){err.textContent='Give your game a name.';return;}
    if(!url){err.textContent='Add a URL or upload an HTML file.';return;}
    const me=DB.me();
    const game={
      id:'g_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),
      name,url,image,
      author:me.username,
      created:Date.now(),
      banned:false
    };
    DB.addGame(game);
    this.closeModal();
    this._renderGames();
    toast('🎮 "'+game.name+'" published!','success');
  },

  /* ── ADMIN ── */
  toggleAdmin(){
    this._admin=!this._admin;
    const p=document.getElementById('adminPanel');
    p.style.display=this._admin?'flex':'none';
    if(this._admin)this._renderAdminList('');
  },
  closeAdmin(){this._admin=false;document.getElementById('adminPanel').style.display='none';},
  filterAdmin(q){this._renderAdminList(q);},

  _renderAdminList(q){
    const list=document.getElementById('adminList');
    const online=DB.online();
    let users=DB.users();
    if(q)users=users.filter(u=>u.username.toLowerCase().includes(q.toLowerCase()));
    const cb=document.getElementById('adminCountBar');
    if(cb)cb.textContent=online.length+' player'+(online.length!==1?'s':'')+' online';
    if(!users.length){list.innerHTML='<div style="padding:24px;text-align:center;color:var(--gray-400);font-size:.86rem">No users found</div>';return;}
    list.innerHTML=users.map(u=>{
      const isOn=online.includes(u.username);
      const isAd=u.username.toLowerCase()===ADMIN.username.toLowerCase();
      const banBtn=isAd?'':(u.banned
        ?`<button class="btn-xs safe" onclick="G._unbanU('${e(u.username)}')">Unban</button>`
        :`<button class="btn-xs danger" onclick="G._banU('${e(u.username)}')">Ban</button>`);
      const gBtn=isAd?'':`<button class="btn-xs neutral" onclick="G._viewGames('${e(u.username)}')">Games</button>`;
      return `<div class="admin-item">
        <div class="admin-item-left">
          <div class="admin-av ${u.banned?'banned':''}">${u.username[0].toUpperCase()}</div>
          <div>
            <div class="admin-uname">${e(u.username)}${u.banned?'<span class="badge-banned">banned</span>':''}</div>
            <div class="admin-status ${isOn?'':'off'}">${isOn?'● online':'○ offline'}</div>
          </div>
        </div>
        <div class="admin-btns">${banBtn}${gBtn}</div>
      </div>`;
    }).join('');
  },

  _banU(u){if(!confirm('Ban '+u+'?'))return;DB.banUser(u,true);const me=DB.me();if(me&&me.username.toLowerCase()===u.toLowerCase())this.signOut();this._renderAdminList(document.getElementById('adminSearch')?.value||'');this._renderGames();toast(u+' banned.','error');},
  _unbanU(u){DB.banUser(u,false);this._renderAdminList(document.getElementById('adminSearch')?.value||'');toast(u+' unbanned.','success');},

  _viewGames(username){
    const games=DB.games().filter(g=>g.author.toLowerCase()===username.toLowerCase());
    const rows=games.length?games.map(g=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--gray-100);gap:10px;">
        <div>
          <div style="font-weight:600;font-size:.9rem">${e(g.name)}</div>
          <div style="font-size:.75rem;color:var(--gray-400)">${g.banned?'🚫 Banned':'✅ Active'}</div>
        </div>
        ${g.banned
          ?`<button class="btn-xs safe" onclick="G._unbanG('${g.id}','${e(username)}')">Restore</button>`
          :`<button class="btn-xs danger" onclick="G._banG('${g.id}','${e(username)}')">Ban</button>`}
      </div>`).join('')
      :`<p style="color:var(--gray-400);font-size:.88rem;padding:8px 0">No games uploaded yet.</p>`;
    this._modal(`<h2>Games by ${e(username)}</h2>${rows}<button class="btn-primary" style="margin-top:20px" onclick="G.closeModal()">Done</button>`);
  },

  _banG(id,un){DB.banGame(id,true);this._renderGames();toast('Game banned.','error');this._viewGames(un);},
  _unbanG(id,un){DB.banGame(id,false);this._renderGames();toast('Game restored.','success');this._viewGames(un);},

  /* ── MODAL ── */
  _modal(html,wide=false){
    const root=document.getElementById('modalRoot');
    root.innerHTML=`<div class="modal-overlay" id="mo" onclick="G._ovClick(event)">
      <div class="modal${wide?' modal-wide':''}">
        <button class="modal-close" onclick="G.closeModal()">✕</button>
        ${html}
      </div>
    </div>`;
    root.querySelectorAll('input').forEach(inp=>{
      inp.addEventListener('keydown',ev=>{if(ev.key==='Enter'){const b=root.querySelector('.btn-primary');if(b)b.click();}});
    });
  },
  _ovClick(e){if(e.target.id==='mo')this.closeModal();},
  closeModal(){document.getElementById('modalRoot').innerHTML='';}
};

/* helpers */
function e(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function ea(s){return e(s);}
function v(id){return(document.getElementById(id)?.value??'').trim();}

function toast(msg,type=''){
  const wrap=document.getElementById('toastWrap');
  const el=document.createElement('div');
  el.className='toast '+(type||'');el.textContent=msg;
  wrap.appendChild(el);
  setTimeout(()=>{el.style.transition='opacity .3s,transform .3s';el.style.opacity='0';el.style.transform='translateX(12px)';setTimeout(()=>el.remove(),320);},3200);
}

/* Boot */
G.init();
</script>
</body>
</html>
